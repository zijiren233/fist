{{- include "fist.validateNamespace" . }}
{{- if and .Values.auth.enabled .Values.auth.tlsSecret.create }}
{{- $secretName := include "fist.auth.tlsSecretName" . -}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName -}}
{{- if $existing }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "fist.labels" . | nindent 4 }}
type: Opaque
data:
  cert.pem: {{ index $existing.data "cert.pem" }}
  key.pem: {{ index $existing.data "key.pem" }}
  ca.pem: {{ index $existing.data "ca.pem" }}
{{- else }}
{{- $ca := genCA "fist-ca" 3650 -}}
{{- $cert := genSignedCert "kube-ca" nil (list "fist.sealyun.cluster.local" "fist.sealyun.svc.cluster.local") 3650 $ca -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "fist.labels" . | nindent 4 }}
type: Opaque
data:
  cert.pem: {{ $cert.Cert | b64enc }}
  key.pem: {{ $cert.Key | b64enc }}
  ca.pem: {{ $ca.Cert | b64enc }}
{{- end }}
{{- end }}
